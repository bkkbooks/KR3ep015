body:
  text: 疔毒黃鼓疔走黃疔毒散溫腫及胸頸內熱便閉防其內陷擬化疔解毒地丁草銀花赤芍大貝連翹黃芩花粉人中白元參薄荷桔梗淡竹葉野菊花頭疔紅腫便閉脈實者必須用鮮生地黃連木通生軍之類蛇頭疔破潰指節須脫急宜清解火毒連翹銀花甘草黃芩丹皮花粉赤芍地丁大貝菊花鎖口疔瘡頭不硬致毒氣走散急為清散牛蒡子甘菊銀花赤芍連翹地丁草大貝草河車淡竹葉野菊花頭血痣額顱血痣翻花上及腮門下至眼胞肉翻崢崚振動出血脈數細左弦陰傷心肝火旺宜犀角地黃湯治之犀角鮮生地連翹赤芍元參粉甘草象貝母粉丹皮知母側柏葉藕節骨槽風腮頰為手陽明所過之地骨槽風症緣陽明濕熱與外風迫結而成其來必驟蓋火性急故也今外潰已久牙關不開緣頰車中堅硬未消開合不利古之用中和湯者因從病久脈虛故用黃耆之補托四物之養血桂心白芷以散結邪銀花花粉元參貝母之清化蘊毒前言所議極是但陽明多氣多血之經溫補過施恐有偏弊之患擬照古之中和湯不增不減可也川芎當歸白芍生地肉桂黃耆花粉粉甘草桔梗大貝銀花紅棗骨槽風頰車內外俱腫內潰流膿宜清胃解毒自主外潰為要川連石膏元參花粉羚羊角丹皮赤芍銀花甘草黃芩淡竹葉蘆根骨槽風潰後筋脈急縮以致牙關緊強兼之餘蘊未清腠理結核兩耳作鳴而音不聰厥少不和陽浮於上擬養陰清肝兼和脈絡北沙參菊花當歸白芍廣皮石決明白蒺藜夏枯草澤瀉丹皮甘草荷葉丸方川芎當歸半夏殭蠶大貝陳皮茯苓白蒺藜北沙參夏枯草元參白芷甘草海螵蛸蜜水法丸早膳後服三錢骨槽風症竇漢卿名穿珠穿腮心法曰牙上發牙槽發二者皆以手少陽三焦足陽明胃二經風火是夫手少陽之經系手走頭足之陽明系頭走足恙由手經而入始則牙痛頤腫面腫上過太陽繼入陽明則由項及胸初時先下於前嗣又慢補於後以致毒火蘊遏傷陰耗氣不能去毒化膿散漫無定脈象左部散大右部濡小舌喎目定陽縮頭面無華汗多氣血兩敗已成陷症藥病不能醫命由天定非人力所能挽也擬方盡人事而已西洋參茯苓甘草銀花花粉川石斛麥冬大貝母緑豆昨晚進湯藥雖有轉機脈仍未起未可為恃原方中加生地五錢骨風潰久牙骨已損完功不易當以補托黃耆當歸黨參甘草白朮白芍川芎肉桂大生地花粉紅棗舌菌舌為心苗腎陰不足心火肝陽上升發為舌菌舌尖肉翻如豆內熱嗆咳頭眩心神不安肺腎亦虧當滋水制陽兼清肺腎鮮生地川貝桔梗元參蒲黃連翹沙參麥冬丹皮茯神川石斛藕牙菌牙菌落而復生肝陽火鬱不解幸軟而不堅可無足慮惟營血素虧肝陽化風左半頭痛脾土又弱腹痛便溏右脈較起脾腎漸有充旺之機肝氣雖強水足而木自柔和虛陽自不上潛仍從脾腎進治潞黨參白朮歸身白芍枸杞子杜仲炙甘草破故紙黃耆廣皮煨薑紅棗牙岩肝火上升致發牙岩內外穿潰肉翻崢崚高年得此惡候極難調治姑擬養陰清肝胃積熱羚羊角大貝甘草元參連翹細生地丹皮花粉石斛麥冬蘆根脈神較起惟肉翻崢崚左腮上齶出血數次火鬱陰傷當養陰清肝生地西洋參玉露霜川石斛白芍南沙參左牡蠣黃柏蒲黃懷山藥山萸肉黑元參坎板人中黃胃火上升牙岩潰腐肉翻且堅難治之症勉立一方羚羊角花粉連翹大貝鮮生地麥冬甘草元參桔梗生石膏此方服四劑後痛定肉平頗效復診加黃柏蘆梗舌岩心脾之火夾痰上升舌岩堅腫破碎飲咽不能症非輕淺擬清火化痰麥冬粉蛤海藻大貝元參殭蠶桔梗橘紅生甘草連翹蒲黃地栗竹茹吹青陽柳華散加琥珀橄欖灰蒲黃冰片已漸軟然未可恃原方加羚羊片丹皮舌疳腎陰不足心火肝陽上亢發為舌瘡舌根破碎成窟不時內熱舌為心苗腎脈貫肝膈循喉嚨挾舌本腎陰不升心火不降未濟之象也恐釀成舌疳大患法當滋水制陽為治生地石斛元參麥冬女貞子象貝母甘草桔梗丹皮玉露霜甘蔗心脾火鬱致發舌疳舌根腫潰連及咽喉症非輕候宜養陰清解細生地丹皮大貝連翹元參生蒲黃蛤粉麥冬甘草桔梗黃柏竹茹舌糜於左心火上盛腎水不足謹防舌疳之患西洋參麥冬甘草青果六味丸鎖喉毒鎖喉毒外腫內閉痰鳴氣促險症也羚羊蔞仁牛蒡子橘紅元參射干片桑皮殭蠶連翹竹油鎖喉毒外腫已退痰鳴亦減仍從前方加減照前方去連翹加桔梗丹皮鎖喉毒漸能哺乳哭聲不出喉外尚腫牛蒡子蔞仁杏仁桑皮貝母橘紅蘇子殭蠶竹油盤槽癰盤槽癰月餘自左及右間潰流膿腮外堅腫硬勢又將破潰發熱便閉食少噦惡脈細神疲陰傷胃熱不化症屬不輕擬以甘寒清解鮮石斛貝母銀花桔梗丹皮使君子元參甘草連翹天花粉橘紅茯苓枳殼蘆根盤槽癰腮外腫勢難消究須外潰精神雖起而熱渴噦惡未減飲食未增陰分大虧症非輕候姑擬養陰清胃鮮石斛懷山藥麥冬茯苓銀花花粉白萹豆北沙參毛燕使君子象貝母穀芽糯稻根對口對口由七情發者宜補六淫發者宜散宜發素有濕與熱相搏致發偏腦疽潰久膿多而硬不消當以消化南沙參丹皮苡米連翹大貝甘草銀花赤芍藕功勞葉對口膿已漸清腫亦漸消似可收斂仍以前法加減前方加當歸去功勞葉風濕熱交熏於上偏對鬢疽腫硬有頭惟對口瘡根散漫均非小恙腑氣不爽宜內疏黃連湯加減薄荷黃連赤芍當歸連翹陳皮銀花生甘草桔梗大貝黑梔淡竹葉瘰癧肝氣夾痰凝滯頸左右瘰癧叢生中脘不暢當養陰清肝化痰川芎當歸香附夏枯草陳皮海藻茯苓廣鬱金殭蠶大貝佩蘭橘葉肝火瘰癧頸項自胛至胯發熱脈數遍體經絡擘痛宜逍遙散加減主之當歸薄荷黃沙參連翹粉甘草赤芍殭蠶丹皮柴胡大貝夏枯草失榮肝鬱不舒氣火夾痰凝結頸左失榮堅腫筋脈攀痛宜清肝解鬱川芎當歸白芍生地夜交藤殭蠶蛤粉大貝鉤鉤夏枯草丹皮金橘葉失榮堅腫痛攀肩背原方加黑山梔三錢去夜交藤鉤鉤操勞思慮郁損心脾木失暢榮氣化為火陽明濁痰藉以上升致頸左堅腫成為失榮焮熱刺痛痰火交併絡中投劑以來腫熱略減惟動則氣升飲咽作阻臥則漸平肺為氣之主腎為氣之根水不養肝蟄藏失職肝逆直奔肺胃職是之故宜滋水柔肝納氣歸腎但舌苔白滑而兩邊尖漸縫陰分固傷上焦痰氣痹郁似宜先清其上兼平肝木俾郁解痰消飲食暢進嗣後再商補腎服清肺化痰之藥肝鬱夾痰項右失榮堅腫經今五月胸背頸項攀痛肝脾兩傷氣血並損姑擬益氣養榮當歸身黨參冬朮白芍川芎清半夏陳皮炙甘草炒生地佩蘭紅棗煨薑乳岩乳頭屬肝乳房屬胃胃與脾相連乳岩一症乃思慮挹郁肝脾兩傷積想在心所願不得志意不遂經絡枯澀痰氣鬱結而成兩乳房結核有年則攀痛牽連筋肝陰亦損氣化為火陽明郁痰不解慮其長大成為岩症速宜撇去塵情開懷解鬱以冀消化乃吉擬方候裁西洋參童便制香附青皮蜜炙川貝母全栝蔞赤白芍毛菰陳皮夏枯草清半夏當歸佩蘭葉紅棗頭乳岩破潰乳房堅腫掣痛定有翻花出血之虞難治之症姑擬養陰清肝中生地當歸白芍黑梔生甘草羚羊片丹皮栝蔞大貝母連翹蒲公英乳岩一年腫突紅紫甫潰兩目筋脈掣痛難治之症勉擬養陰清肝北沙參麥冬大貝丹皮當歸羚羊片黑梔連翹甘草澤蘭夏枯草藕肝鬱乳核氣化為火抽引掣痛恐釀成乳岩大症宜清肝湯主之當歸栝蔞丹皮夏枯草連翹大貝黑山梔澤蘭北沙白芍金橘葉血不養肝肝氣鬱結右乳脹硬乳頭掣痛勢成岩症急為清肝解鬱冀消化為要全栝蔞青皮甘草白朮薄荷當歸柴胡白芍黑梔丹皮蒲公英橘葉暴怒傷陰厥氣火偏旺與陽明之痰熱交併於絡以致乳房堅腫頸顏連結數核或時掣痛已成岩症脈數右洪氣火不降謹防破潰急為養陰清肝羚羊片天門冬全栝蔞大貝丹皮黑梔鮮石斛連翹澤蘭赤芍黑元參蒲公英氣虛生痰陰虛生熱氣火夾痰交併絡中乳岩堅腫痛如蟲咬此陽化內風動擾不寧每遇陰晦之日胸悶不暢陰虧液燥宜養陰清氣化痰緩緩圖之天冬羚羊夜合花橘葉鬱金海蟄蔞仁茯苓川貝母澤蘭連翹勃薺乳核掣痛已減肝火未清脈尚弦數仍以前法全栝蔞白芍當歸丹皮夏枯草連翹北沙參大貝黑梔澤蘭合歡花橘葉肝氣夾痰左乳房結核三月幸未作痛可冀消散宜清肝散結當歸柴胡連翹赤芍香附殭蠶青皮大貝夏枯草栝蔞蒲公英橘葉井疽五臟之尊心為之主以腎過用腎水下虧水不火心陽擾動營不內守則腰痛咯紅繼患井疽外潰已久不時嘈雜氣餒中虛當營衛並倍兼以養心當參茯苓參鬚遠志牡蠣甜冬朮懷藥歸身白芍陳皮柏子仁生地紅花蔽骨疽肝氣夾痰凝滯蔽骨發為痰疽已潰一頭腫硬不消又將破潰脈來兩尺弦數榮血已虧陽明痰氣不清宜養榮和衛兼化痰軟堅之治當歸清半夏陳皮茯苓栝蔞仁廣鬱金大貝左牡蠣蘇根佛手敷海浮蔽骨疽腫硬較松膿亦較厚仍和榮化堅前方去蘇根加澤蘭連翹藕節蔽骨痰疽膿成將潰當以清托南沙參大貝陳皮連翹甘草川石斛當歸茯苓蔞仁藕節石疽石疽乃氣血冰凝成此惡疾起自左腋結硬漸次硬及乳房肩臂頸項木腫日夜掣痛氣血俱虛難治之症姑念遠來勉方冀幸黨參大熟地上肉桂焦白朮大白芍全當歸川芎茯苓香附炙甘草桑皮紅棗頭抑鬱傷肝思慮傷脾肝脾榮損氣動於中木火夾痰上升少陽經氣鬱結頸左發為石疽硬堅如石肩項酸脹牙緊喉痹脈細神羸已入沉疴勢難挽救姑念遠來擬方回府調理黨參冬朮當歸川芎白芍香附大貝清半夏陳皮茯苓甘草煨薑紅棗心肝抑鬱不遂氣化為火火與痰升頸左發為石疽堅腫色紅勢將外潰潰則難愈姑擬養榮清肝化堅北沙參川芎白芍元參香附清半夏大貝當歸連翹中生地左牡蠣橘葉肝脾鬱結氣與痰滯石疽堅腫咽腫喉痹牙緊頸酸項脹厥少不和經絡壅塞七情至傷之病治調非易脾胃又薄便溏食入作嘔吐慎防脾敗姑擬扶土和中冀其納穀為幸焦白冬朮枳實二分同炒佩蘭木香枳殼砂仁陳皮潞黨參藿香炒半夏鬱金穀芽炙甘草茯苓金橘葉治虛勞嘔吐方嘔吐已止飲食加增石疽腫亦較退似有轉機但牙緊未松喉痹未舒脈沉弦澀陰傷木鬱痰氣凝痹上尚在險途恐未為可恃姑從原法治之黨參冬朮川芎當歸半夏砂仁陳皮枳殼佩蘭廣鬱金白芍橘葉石疽腫硬稍松七情至傷之病究難消散因日來飲食加增精神稍復姑擬原方進治黨參當歸清半夏佩蘭冬朮白芍陳皮炙草川芎茯苓大貝老薑橘葉日來精神飲食倍增石疽堅腫亦見收束是萬億之幸也宜香貝養榮湯主之黨參當歸白芍陳皮白朮川芎茯苓清半夏大貝香附炙甘草牡蠣紅棗橘葉恙勢日見起色宗前法治生地蒲黃炒當歸陳皮大貝白芍潞黨參川芎茯苓香附清半夏牡蠣遠志金菊葉紅棗薑石疽腫勢稍加且作脹痛肝火復升宜和榮化堅兼舒肝鬱前方去生地遠志加夏枯草石疽復腫又復作吐心胸懊憹肝胃氣逆極虛之體攻補兩難屬在險途姑擬香砂六君湯加味主之當參冬朮當歸佩蘭廣皮茯苓穀芽木香砂仁清半夏炙草鬱金生薑棗痰氣血積於肝絡少腹兩旁石疽堅腫木不知痛姑擬溫消冀其不潰乃吉當歸赤芍桃仁茯苓肉桂清半夏陳皮甘草延胡楞子生薑濕瘀凝滯經絡委陽穴石疽堅腫色紫焮及內側足肚木腫夜分熱痛將來難於收斂急為利濕化凝以冀收束為要生首烏歸尾甘草沒藥連翹川萆薢赤芍桃仁黃柏澤蘭淮牛膝廣皮桑枝鬱怒傷肝氣滯於絡絡血因之留阻胸脅作痛繼之乳根堅腫石疽大症脈來弦強動勞喘氣自汗盜汗肝陰傷腎氣不攝症勢極重擬育陰柔肝以化堅結北沙參牡蠣當歸大貝白芍遠志肉澤蘭茯神丹參廣皮橘葉栝蔞子藕節疵疽疵疽右膝漫腫而熱瘍科重症姑擬利濕化凝保其不潰乃吉歸鬚赤芍川牛膝沒藥川黃柏防己桃仁白芷甘草裝半夏澤蘭茯苓桑枝藕節附骨疽附骨疽破潰成漏大生地山萸肉當歸遠志澤瀉甘草鹿角膠淮牛膝白芍茯苓白朮紅棗桑枝串臂漏串臂漏久肌肉僵硬體質虧弱不易速愈煎劑培養氣血兼清濕熱晚進丸藥退管化堅緩緩調之生首烏苡仁當歸槐角丹皮皂角刺金銀花大貝生甘草茯苓紅棗肛漏肛漏一年陰氣耗泄於下陽傷於上冬春咳嗽惡寒肝氣拂鬱肚腹作痛入夏以來嗆咳益加咽痛妨食痰多作惡腹痛頻頻大便時溏脈來尺寸弱而急肺腎並虧肝木侮土勢入損門殊屬重候擬養榮柔肝兼補肺滋腎東洋參白芍當歸炙甘草冬蟲草淮山藥蓮子沙苑子甜杏仁大生地蛤粉炒橘紅大麥冬肛有漏卮陰氣先虧於下子病及母致生喘咳宜金水並調北沙參女貞子全歸馬料豆沙苑子淮山藥淮牛膝大麥冬茯苓杏仁蓮子肝癰肝癰背肋腫痛一月邇來咳嗽氣急痰腥肢冷汗多或作蛻熱脈虛細症勢極重礙方以望轉機首烏半夏茯苓北沙參杏仁蔞仁粉蛤麥冬川貝橘紅梨肝氣夾痰凝結於絡左肋結硬漫腫勢成肋癰發熱胸痞不舒宜疏肝化痰解鬱生首烏香附赤芍半夏殭蠶新絳枳殼澤蘭茯苓青皮鬱金蔥管肋癰硬痛發熱胸脘阻隔半月未得更衣宜疏肝和胃兼以通幽廣鬱金蔞仁枳殼赤芍旋覆花山梔藕根桃仁通草青皮半夏曲佛手荸薺肋癰即肝癰也乃痰氣血滯於肝絡肝脹成癰外潰兩月肉腐外紫胸背骨脹內熱咳嗽短氣脈數肝肺兩傷榮陰大損勢入損門姑擬清養北沙參杏仁丹皮淮藥大貝川石斛麥冬蔞仁茯苓藕枇杷葉肋癰潰久肋骨傷損不易完功宜內托生地當歸白芍淮藥粉甘草茯苓玉竹料豆陳皮象牙屑紅棗附論素問以肝癰兩胠滿臥則驚不得小便又曰期門隱隱痛者肝癰其上肉微起者肝癰未能詳言後陳遠公曰人素多鬱怒致兩胠脹滿發寒發熱繼而脅疼手不可按火盛爍乎肝血此肝葉生瘡在左不在右左脅之皮必見紅紫五色以化肝消毒湯丹溪治以復元通氣散柴胡清肝湯潰後八珍六味滋補脾腎法致難稍備究未詳明確當肝之脈從股陰入毛中環陰起器抵少腹上貫肝膈布胠至期門而終肝氣壅滯故脹滿不得小便肝病發驚駭魂不藏故臥則多驚故肝盛則兩胠痛怒火動則爍肝血血凝氣壅則肝脹生癰手不可按毒聚而未成若皮現紅紫之色內膿已成發越於外之象也嗜酒之人每多此患酒入於胃則肝橫膽浮肝即橫則氣血不能順行胃中痰濁亦旁流於脅痰氣血交混結而為癰又有閃氣之人亦生此患閃則氣滯而血亦滯久而不愈亦發癰瘍小兒亦見有之小兒之生乃因痰熱入於肝絡先咳嗽而後脅助腫脹但此症初生病者因不生癰而醫者總云肝氣十有八九一派辛香耗氣逮至脅肋腫脹姑知生癰必呼吸不利轉側不能手不可按症明且確醫者豈可自恃萬能按脈即曉以肝氣治貽誤匪淺肝火甚者脈必弦數挾瘀者脈弦澀挾痰者脈弦兼滑治與肝氣迥殊傷於此者不知幾何故諄諄辨論臨症之時不可不審也用特列方於後並録治驗數則以便參觀一方化肝消毒湯當歸白芍銀花黑梔甘草此用歸芍入肝滋血甘草緩肝梔子清肝銀花解毒火平肝緣血生而痛自止二方柴胡清肝湯治怒火上升憎寒惡熱肝膽風熱瘡瘍柴胡黃芩甘草南沙參川芎黑梔三方復元通氣散治閃挫氣血凝滯腰脅引痛小茴香延胡陳皮甘草炙甲片白醜木香四方六味地黃湯治肝癰潰後發熱虛羸脈數服此以滋肝腎大生地山萸肉澤瀉丹皮淮藥五方八珍湯治肝癰潰久氣血俱虛脈弱當歸川芎白芍生地黨參白朮茯苓炙甘草六方清肝活瘀湯治閃挫脅痛瘀凝於絡肋骨腫脹者當歸赤芍新絳桃仁青皮廣鬱金參山七枳殼蘇根澤蘭瓦楞子七方疏肝流氣飲治肝癰初起左脅掣痛呼吸不利蘇根枳殼通草廣鬱金延胡青皮佛手當歸烏藥香附八方舒郁滌痰湯治肝癰六七日後脅肋微腫或兼咳嗽大便不利香附當歸佛手橘紅蔞仁廣鬱金茯苓蘇根枳殼參三七半夏竹茹加味金鈴子散川楝子延胡青皮赤芍甘草黑梔枳殼通草橘紅肺癰肺癰一年咳吐膿血發熱脈數勢入損門當養陰清痰熱南洋參杏仁苡米橘紅象貝鮮百部蛤粉麥冬丹皮花粉蔞仁梨片肺癰咳吐膿血之後而夜分嗆咳不止入暮作寒肢冷體痛肺胃榮衛皆虛肝陽不降宜養肺胃兼以柔肝當歸炙甘草首烏淮牛膝北沙參杏仁橘紅蛤粉茯苓紫菀淮山藥棐子風陽外受肺胃之痰熱內蘊咳嗽發熱胸脅作痛防成肺癰急當清降薄荷杏仁桑皮通草茯苓橘紅枳殼川貝蘇根蔞仁枇杷葉茅根痰氣蘊結肝肺咳嗽發熱痰腥脅痛防成肺癰當以清降南沙參杏仁百部蛤粉川貝丹皮橘紅通草蔞皮枇杷葉竹茹漫心癰悲哀傷中氣凝血結臍上脘下結硬作痛已成漫心痰寒熱瀉黃脈弦夾有暑邪殊非小恙姑擬宣暢氣血散結化痰之治柴胡葛根薄荷鬱金赤芍川貝枳殼赤芍青皮通草製半夏荷葉佛手馬刀癧勞倦致傷加復憂思鬱結頸左右發為馬刀堅腫如石痛掣頭腦脈細軟氣血兩虧生氣日殘極難調治姑擬養榮扶土以化堅結川芎當歸白芍熟地白朮黨參炙甘草茯苓陳皮大貝香附肉桂煨薑紅棗復診原方加牡蠣血虛肝火夾痰凝結頸右發為馬刀結核堅腫硬如石發熱脈細症勢極重宜和榮化痰緩緩取效當歸淮藥黨參香附北沙參大貝石斛茯苓佩蘭製半夏廣皮紅棗脈弦右滑左關且徑榮陰不足厥陰氣火內動夾痰上升凝結少陽之分頸右發為馬刀結核堅腫治調不易擬養榮清肝化堅川芎當歸白芍生地製半夏殭蠶廣皮香附大貝北沙參石牡蠣橘葉復診加山茨菰木鬱較舒馬刀結硬稍鬆軟宗前法治川芎當歸白芍生地人參鬚陳皮香附大貝牡蠣山茨菰半夏遠志橘葉鬱怒傷肝思慮傷脾痰氣鬱結頸右馬刀癧堅腫頭半掣痛症勢非輕宜養榮清肝化痰更宜屏去塵情勿怒勿勞為要當歸香附茯苓川芎白蒺藜白芍半夏大貝牡蠣杭菊薑蠶陳皮馬刀癧為瘍科要連投解鬱清肝頭痛已平目能啓視似有轉機但午後微惡寒熱痰癧堅腫如故木鬱不達宜逍遙散合化堅湯主之當歸白芍半夏香附白蒺藜柴胡陳皮大貝牡蠣橘葉肝氣夾痰凝結左腋挾癭馬刀脹及乳房焮熱作痛防其破潰潰則難愈宜清肝化痰栝蔞大貝清半夏澤蘭赤芍殭蠶夏枯草當歸香附連翹復診加海藻青皮橘葉少陽相火夾痰上升頸右馬刀腫硬誤施針砭焮腫益甚掣痛不休血出頭暈症屬不治勉立一方鮮生地元參黑梔大貝赤芍羚羊角麥冬丹皮連翹知母側柏葉黃芩腎俞發黃耆當歸首烏苡仁花粉丹皮緑豆腎俞發漫腫不能轉側呼吸作痛濕氣化痰烏藥五靈脂半夏延胡赤芍當歸桂枝獨活秦艽桑枝好黃酒少腹癰少腹癰症有氣血凝滯者有濕熱流注小腸者有寒濕鬱結而成者恙起去夏少腹梗硬攻衝作痛少腹乃廣腸部位肝脈遊行之所肝氣拂鬱寒邪乘之腸胃之氣火失利血隨氣阻日久正虛邪凝愈甚自冬及春愈形高腫色紅而軟內膿已成定須外潰然腸膜受傷恐糞穢並出且飲食少進溲出便閉內熱舌乾脈數陰傷熱鬱倘大膿後胃氣不蘇元氣不續深為可慮若論瘍科治法當補托毒之劑然虛不受補清則礙脾治當舍外而從內議調胃育陰陰充便自通胃和而食自進矣生首烏淮藥柏子仁茯苓穀芽北沙參廣皮當歸玉竹毛燕腸癰外潰已得微膿且穢從孔出濁氣外泄大非所宜脈象難和食難漸進惟慮正氣與濁氣並出有上下交脫之慮急當原方加白芍參鬚熟地腑氣已通原方加黨參石斛去柏子仁生首烏腸癰潰後膿少氣多腫平一半脈靜身涼一夜神安熟寐是屬佳兆黎明之際外患復增腫痛卯時氣虛滯於大腸邪正交攻腸膜損傷恐難完固當陰陽並補兼以護膜保無更變乃佳潞黨參懷山藥炙甘草象牙屑茯苓廣皮當歸玉竹大熟地白芍參鬚黃絲絹腸癰一月少腹內硬拘攣作痛小溲渾濁如膿宜化瘀利濕萆薢茯苓淮膝赤芍澤瀉車前黃柏延胡歸尾杏仁蔞仁藕節氣血凝滯少腹硬痛小溲不爽寒熱勢成腸癰急為流氣化痰歸尾桃仁延胡索青皮山楂肉枳殼烏藥五靈脂腸癰一年內膜已傷形衰脈弱難治之證十全大補丸又服琥珀蠟礬丸腸癰外潰穢從孔出腸膜穿破極難收口宜十全大補加味主之加木香萸肉黃絲絹腸癰內硬較松膿亦較清尚宜前法加減當歸鹿角膠淮牛膝澤瀉萆薢甘草蒲公英肉桂苡仁赤苓縮腳癰縮腳癰兩旬右胯掣痛兼惡寒熱急為疏解獨活防風桂枝川牛膝左秦艽全蠍五靈脂赤芍當歸半夏陳酒縮腳癰三月右胯掣痛筋掣大肉漸瘦陰分已虧絡中寒濕不解勢成殘廢當養榮溫經通絡生地當歸獨活淮牛膝炮薑木瓜天麻附子鹿角屑桑枝陳酒濕瘀滯於腸胃致成縮腳腸癰右胯拘掣作痛少腹腫硬勢將成膿宜利濕化瘀歸尾赤芍淮牛膝茯苓延胡桃仁青皮生首烏丹皮半夏金銀花藕節縮腳癰腿痛筋吊急為和榮通絡歸尾川淮牛膝桃仁秦艽威靈仙桂枝絲瓜絡赤芍紅花獨活桑枝陳酒流注脈象兩關細弦而右兼澀脾有濕痰肝氣大旺榮衛不利以致胸腹不舒腰髀作痛不能轉側左肋痰注成漏間日必服通利之劑而胸腹頓舒然取快一時恐傷胃氣宜和榮衛化痰兼平肝木當歸茯苓黑醜川楝子青皮苡米陳皮丹參淮牛膝半夏郁李仁絲瓜絡木旺水虧脾多痰濕肝風暈厥之疾數年去冬漸至臥床不起肝腎血液俱疲春分後木挾相火用事濕痰隨風火之氣充斥三焦眩暈發熱遍體作痛疑以舊恙復萌詎知模骨之旁結為癰毒約半月有餘是穴乃肝經部位火濕凝聚絡中所致肝熱最易上升濕火熏蒸胃腑始則發熱譫語後漸熱退神安乃濕熱之邪歸併下焦是外患之見端非舊恙之復萌也現已成膿半月未得更衣齒乾苔燥陰傷而濕火不化症雖屬外而藥餌尤當治內幸脈衝和而關微弦象似可無虞擬用甘寒育陰兼和中潤下之治南沙參麥冬川石斛大貝柏子仁栝蔞仁苡米仁茯苓天花粉藕青皮甘蔗流注臂臑已成右腎俞穴結腫痛難轉側為患最劇急為和氣化痰蒼朮烏藥半夏全蠍當歸川芎桂枝蘇葉赤芍陳皮獨活酒背俞痰注痛膿從肋縫而出難以速愈兼之發熱面浮胸腹飽脹泄瀉脈滑數痰濕滯脾症非輕候當先其內小川朴茯苓神麯砂仁雞內金苡米仁麥冬枳殼青皮生首烏鮮荷葉腎岩腎岩乃瘍科惡候鮮有收功經治以來翻花腫硬雖見松輕究未可恃也仍宗前法進步紅棗藕懷山藥當歸黃柏澤瀉茯苓知母麥冬堅岩腫勢較平慎防出血擬方多服保守而已懷山藥當歸川連生地黃柏赤白芍澤瀉龜板茯苓知母烏鯽骨丹皮玉莖者即宗筋也乃腎臟之主又十二經絡之總會馬口端屬手少陰心經腎臟陰虛火鬱心肝二臟之火復會於此始時莖頭馬口癢碎漸生堅肉業已年餘今夏破潰翻花出數次火鬱日久必致外越血得熱而妄行經云實火可瀉虛火可補且龍雷之火不宜直折脈細數陰分大傷急當峻補真陰兼介類潛陽之法俾龍雷之火得以歸窟而外患方保無虞西洋參麥冬丹皮天冬小生地元武板粉茸澤瀉白芍藕脫囊脫囊黑腐溫邪內逼噦惡泄瀉脈細舌白高年重症慎防厄脫先為和中止泄川朴菖根枳殼車前子左金丸茯苓藿梗廣皮半夏大腹皮炙甘草荷葉土灶心伏兔癰伏兔癰漫腫內硬已延兩月發熱口乾脈虛數宜養溫通經絡中生地淮牛膝肉桂當歸陳皮炙甲片黃柏製半夏赤芍甘草桑枝伏兔癰潰久濕熱上升腮齦口舌糜腐先為清解元參川毛連桔梗連翹花粉粉丹皮甘草黃芩靈根眼胞痰瘤眼胞屬脾脾氣呆鈍濕痰濁氣上升滯於膜里眼胞痰瘤數年日漸腫大下垂將來定須外潰宜和榮化痰泄濁川芎當歸南星桃仁清半夏殭蠶茯苓陳皮海藻大貝元參薑痰瘤漸鬆前方加白芥子毛茨菰荸薺脾肚發脾肚發外潰爛勢大當以托裡當歸甘草連翹銀花大貝花粉黃耆赤芍陳皮緑豆腸覃脈來左部細弦右部沉澀榮血不足肝氣不強脾氣不利氣血與汁沫凝結腸外結為腸覃狀如懷子幸月事仍以時來法宜養榮兼流氣化凝治之淮牛膝丹參川楝子桃仁青皮上肉桂當歸烏藥香附延胡瓦楞子降香片胃脘癰胃脘癰硬於右呼吸轉側不能已半月餘勢將外潰宜理氣化痰炙甲片製半夏延胡赤芍生首烏白茯苓陳皮青皮舌根癰舌根癰硬痛大便閉通降法生軍牛蒡子薑蠶赤勺連翹橘紅風化硝元參薄荷竹葉鶴膝風鶴膝風腫痛稍減宗原治法當歸沒藥川黃柏桂枝淮牛膝苡米五加皮獨活絲瓜絡蒼朮川萆薢茄皮桑枝附論鶴膝風症前賢以足三陰虧損風寒濕三氣襲於經隧其治皆以辛溫開發宣通經絡豫謂又有不然若肝腎陰虧夾濕熱者豈可以辛溫例治如的系三氣雜成宗右法又有濕痹一症與鶴膝風相似不可不明辨也痹則兩膝腫痛或足踝不腫雖三月五月之久而腿肉不消筋脈不拘鶴膝則二月後大肉枯細屈不能伸以此為辨而治法亦殊痹症屬實鶴膝夾虛有單有雙如肝腎陰虧陽明濕熱下注膝腫熱痛若進辛溫是助其熱虧其陰必致腫潰為敗症始宜通絡利濕繼以養陰清絡若初起腫痛按之不熱雖寒熱者以萬靈丹汗之用獨活滲濕湯防己桂枝湯日久腿足枯細者古之大防風湯勝駿丸三痹湯等方選用脈見細數雖風寒濕之症過餌溫熱恐濕寒化熱亦致釀膿憑脈用藥認症分濕與熱最為的當至外治者諸方詳載於後一方通絡利濕湯治鶴膝腫熱作痛大豆卷防己赤芍秦艽川牛膝川萆薢乾地龍歸鬚黃柏白茄根桑枝二方養陰清絡飲治鶴膝腫熱日久夜分痛甚者炙鱉甲秦艽黃柏炙龜板地龍川石斛獨活赤芍川牛膝當歸川萆薢苡米仁桑枝三方獨活湯治鶴膝風因風寒濕初起腫痛寒熱者獨活防風蒼朮黃柏當歸秦艽防己萆薢赤芍川牛膝四方防己桂枝湯治寒濕鶴膝初起腫痛無熱者桂枝川萆薢獨活秦艽川牛膝白茄根木防己赤芍蒼朮炙沒藥全當歸炒桑枝五方防風湯治三陰不足風邪乘之兩膝作痛膝腫而腿細潞黨參黃耆熟地木防風懷牛膝熟附子甘草羌活川芎生白朮全當歸川杜仲桑枝六方獨活寄生湯治肝腎虛風濕入絡足膝掣痛痹獨活雲茯苓防風大生地桑寄生細辛秦艽川芎大白芍桂心人參杜仲當歸懷牛膝生甘草七方三因勝駿丸治鶴膝風膝腫腿細手足寒攣走注疼痛三陰不足寒濕氣侵者熟地附片當歸蓯蓉破故紙蒼朮全蠍檳榔懷牛膝萆薢乳香木香射干炙沒藥木瓜防風天麻棗仁川羌活巴戟肉上藥為末爛蜜法丸八方三痹湯治寒濕痛痹膝踝腫脹三陰不足川芎當歸白芍生地防風秦艽黃耆茯苓炙甘草牛膝獨活川杜仲桂心細辛羌活續斷黨參九方史國公藥酒治手足拘掣半身不遂或腿膝痹痛鶴膝等症養血祛風壯骨健脾滲濕羌活二兩防風二兩白朮二兩當歸二兩川萆薢二兩杜仲二兩松節二兩虎骨二兩杞子二兩蠶沙二兩秦艽四兩鱉甲二兩茄根八兩蒼耳四兩川牛膝二兩上藥用好陳酒三十斤煮服外治丹散洪寶丹治膝蓋腫痛而熱皮色不變用蔥湯調敷地骨皮散治鶴膝腫熱痛甚者用車前子草打汁調敷沖和膏治膝腫而潮熱者用醋調敷鶴膝散治鶴膝因受風濕腫者白芷四兩陳酒二十兩煎稠去渣以筆醮酒塗香桂散此散治一切風寒濕氣筋骨疼痛溫經通絡摻膏藥上貼之生附子二錢麝香二分川烏二錢細辛二錢木香二錢炙沒藥二錢肉桂二錢草烏二錢丁香二錢樟冰二錢共為細末隨症聽用麻風論麻風古稱癘風癘者榮氣熱臟氣不清故使鼻柱壞而色敗肌膚瘍腐風寒客絡脈而不去名曰癘風方書俱以風藥混治又無先後之分並有蘄蛇虎骨山甲走竄蜈蚣溫而有毒服之未有不焮發者豫閲歷多多是症風濕濕毒毒癘諸種有肌表經絡之殊肺司皮毛胃主肌肉肺虛則腠理不密胃氣薄則肌肉疏豁易於觸受或暴露陰濕晦霧或坐臥濕地氣血滯而不行初起一點麻木不知痛癢毛竅閉塞汗孔不透漸次延及遍身斑如雲片微微扛起或白或紅然在上者多風風為陽邪陽從上受白而紅者風兼熱也在下多濕濕為陰邪從下襲紅而扛者濕兼熱也毒癘則由口鼻吸入陽明獨受其邪血壅熱蒸初起身麵疙瘩成塊扛起日久腳指常起疱鼻柱壞節脫氣移肌膚瘍腐始時均宜汗解開通腠理用萬靈丹汗之風勝者消風散蒺藜丸濕勝者苦參丸滲濕湯毒甚者雙解散通聖散羚羊角散解毒湯俱可選用以上皆發於肌表肺胃受病居多若在經絡則四肢指節作麻拘掣肉削日久足破掌穿上部面頰麻木口喎目淚眼翻皆風濕入於經絡之見證初起亦宜汗解次以蒺藜丸苦參丸消風散利濕湯通經湯選用忌辛辣炙煿酒醋等物避風雨戒房幃十中猶可保全六七病者勿以初起而忽諸萬靈丹治癰疽諸發等瘡初起憎寒壯熱渾身拘急疼痛並治癘風麻木不仁茅朮二兩何首烏二兩羌活二兩荊芥二兩明雄黃六錢甘草一兩川石斛一兩川烏二兩薑汁炒去皮尖全蠍炙一兩防風一兩細辛一兩全當歸一兩硃砂六錢麻黃一兩明天麻一兩上藥細末煉蜜為丸硃砂為衣每服一錢用蔥頭兩枚豆豉三錢煎湯下服後進以稀粥助令汗出避風寒忌生冷戒房事孕婦忌之此方屢試屢驗故有萬靈之名防風通聖散此足太陽陽明藥也外為